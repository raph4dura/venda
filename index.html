<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Equipe Bazze</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

#video{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.frase{
font-size:2rem;
opacity:0;
transition:1s;
position:absolute;
padding:20px;
}

#contador{
font-size:90px;
font-weight:bold;
opacity:0;
transition:1s;
}

#tituloFinal{
opacity:0;
transition:2s;
}

h1{
font-size:55px;
margin-bottom:15px;
color:#FFD700;
}

h2{
font-size:32px;
margin-top:20px;
color:#00E5FF;
}

p{
font-size:22px;
margin-top:15px;
}

img{
width:320px;
max-width:90%;
margin-top:30px;
border-radius:18px;
box-shadow:0 0 40px #00bfff;
animation:flutuar 3s infinite;
}

@keyframes flutuar{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

.luz{

position:absolute;
width:250px;
height:250px;
background:#00bfff;
border-radius:50%;
filter:blur(140px);
animation:luz 4s infinite;
opacity:.25;

}

@keyframes luz{

0%{left:-150px;top:0;}

50%{left:80%;top:15%;}

100%{left:-150px;top:0;}

}

</style>

</head>

<body>

<div class="luz"></div>

<div id="video">

<div class="frase" id="f1">
Toda grande conquista começa com uma equipe.
</div>

<div class="frase" id="f2">
Toda grande equipe tem uma identidade.
</div>

<div class="frase" id="f3">
A <b>BAZZE</b> que conecta, cria e conquista!
</div>

<div id="contador"></div>

<div id="tituloFinal">

<h1>🏳️ EQUIPE BAZZE 🏳️</h1>

<img src="IMG-20260630-WA0004.jpg" alt="Equipe Bazze">

<h2>
A BAZZE que conecta, cria e conquista!
</h2>

<p>
União • Criatividade • Estratégia • Vitória
</p>

</div>

</div>

<script>

const f1=document.getElementById("f1");
const f2=document.getElementById("f2");
const f3=document.getElementById("f3");
const contador=document.getElementById("contador");
const final=document.getElementById("tituloFinal");

function mostrar(el){

el.style.opacity=1;

}

function esconder(el){

el.style.opacity=0;

}

setTimeout(()=>{

mostrar(f1);

},1000);

setTimeout(()=>{

esconder(f1);

},4000);

setTimeout(()=>{

mostrar(f2);

},5000);

setTimeout(()=>{

esconder(f2);

},8000);

setTimeout(()=>{

mostrar(f3);

},9000);

setTimeout(()=>{

esconder(f3);

},12000);

setTimeout(()=>{

contador.style.opacity=1;
contador.innerHTML="3";

},13000);

setTimeout(()=>{

contador.innerHTML="2";

},14000);

setTimeout(()=>{

contador.innerHTML="1";

},15000);

setTimeout(()=>{

contador.innerHTML="🏆";

},16000);

setTimeout(()=>{

contador.style.opacity=0;
final.style.opacity=1;

},17000);

</script>

</body>
</html>
